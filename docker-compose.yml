services:
  app:
    image: ghcr.io/zahid-afridi/izo-crm:latest
    container_name: izo-crm-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    networks:
      - izo-net

  nginx:
    image: nginx:alpine
    container_name: izo-crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - izo-net

networks:
  izo-net:
    driver: bridge
